<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cortex Engine - Created by Trent DeRosa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-a: #eef6ff;
      --bg-b: #dceeff;
      --bg-c: #cfe4ff;
      --ink: #10233c;
      --muted: #4b6483;
      --panel: #ffffffd4;
      --line: #cad8ea;
      --brand: #4f9dff;
      --brand-soft: #d7e9ff;
      --user: #eef6ff;
      --bot: #ffffff;
      --error: #9d2f2f;
      --aside-bg: #fbfffcaa;
      --form-bg: #ffffffc8;
      --input-bg: #fff;
      --input-focus-shadow: #9bc8ff44;
      --code-bg: #eef4ff;
      --code-border: #d6e4ff;
      --pre-bg: #f8fbff;
    }
    .dark {
      --bg-a: #0d1117;
      --bg-b: #111722;
      --bg-c: #0a0f1a;
      --ink: #e6edf3;
      --muted: #8b949e;
      --panel: #161b22e8;
      --line: #30363d;
      --brand: #58a6ff;
      --brand-soft: #1f3a5a;
      --user: #1a2840;
      --bot: #1c2128;
      --error: #f85149;
      --aside-bg: #13181fee;
      --form-bg: #161b22cc;
      --input-bg: #1c2128;
      --input-focus-shadow: #388bfd33;
      --code-bg: #1e2838;
      --code-border: #2d3748;
      --pre-bg: #161b22;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 600px at 12% 8%, var(--bg-c), transparent 60%),
        radial-gradient(1000px 700px at 90% 90%, var(--bg-b), transparent 65%),
        linear-gradient(145deg, var(--bg-a), #eef5f1);
      min-height: 100vh;
      display: block;
      overflow: hidden;
      transition: background 0.2s, color 0.2s;
    }
    .dark body, body.dark {
      background: linear-gradient(145deg, var(--bg-a), var(--bg-b));
    }
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(#ffffff20 1px, transparent 1px), linear-gradient(90deg, #ffffff20 1px, transparent 1px);
      background-size: 26px 26px;
      pointer-events: none;
      mask-image: radial-gradient(circle at center, black 35%, transparent 85%);
    }
    .app {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      border: none;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: none;
      display: grid;
      grid-template-columns: 280px 1fr;
      overflow: hidden;
      transform: translateY(14px);
      opacity: 0;
      animation: fadeIn 450ms ease forwards;
      transition: grid-template-columns 0.25s ease;
    }
    .app.sidebar-hidden {
      grid-template-columns: 0 1fr;
    }
    .app.sidebar-hidden aside {
      width: 0;
      min-width: 0;
      padding: 0;
      opacity: 0;
      border-right: none;
      pointer-events: none;
      overflow: hidden;
    }
    @keyframes fadeIn {
      to { transform: translateY(0); opacity: 1; }
    }
    aside {
      border-right: 1px solid var(--line);
      padding: 22px 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: var(--aside-bg);
      overflow: hidden;
      transition: opacity 0.2s ease, padding 0.25s ease;
    }
    .logo {
      font-family: "Space Grotesk", sans-serif;
      font-size: 27px;
      letter-spacing: 0.2px;
      font-weight: 700;
    }
    .tag {
      margin-top: -8px;
      color: var(--muted);
      font-size: 13px;
    }
    .controls {
      margin-top: 8px;
      display: grid;
      gap: 10px;
    }
    .auth-box {
      margin-top: 4px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 12px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .auth-box input {
      font-size: 12px;
      padding: 8px 10px;
    }
    .auth-actions {
      display: flex;
      gap: 8px;
    }
    .plan-actions {
      display: flex;
      gap: 8px;
    }
    .plan-actions button {
      flex: 1;
      border: 1px solid #b9d8ff;
      background: #edf6ff;
      color: #1a4f83;
      border-radius: 9px;
      padding: 7px 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .auth-actions button {
      flex: 1;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 9px;
      padding: 7px 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .auth-secondary {
      border: 1px solid #c7d8ef;
      background: #f7fbff;
      color: #2a4d75;
      border-radius: 9px;
      padding: 7px 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    .auth-user {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }
    .btn {
      background: linear-gradient(135deg, #66b2ff, #4f9dff);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: "Space Grotesk", sans-serif;
    }
    .btn:hover { filter: brightness(1.03); }
    main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      min-height: 0;
    }
    header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-toggle {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-family: "Space Grotesk", sans-serif;
    }
    .title {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      font-size: 18px;
    }
    .sub {
      color: var(--muted);
      font-size: 12px;
    }
    #chat {
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }
    .bubble {
      max-width: 84%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      line-height: 1.55;
      box-shadow: 0 3px 12px #0f302109;
      animation: pop 170ms ease;
      font-size: 15px;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .bubble-content {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }
    .bubble-content p { margin: 0 0 10px 0; }
    .bubble-content p:last-child { margin-bottom: 0; }
    .bubble-content ul {
      margin: 0 0 10px 18px;
      padding: 0;
    }
    .bubble-content li { margin: 0 0 5px 0; }
    .bubble-content a {
      color: var(--brand);
      text-decoration: underline;
      text-underline-offset: 2px;
      word-break: normal;
      overflow-wrap: anywhere;
    }
    .bubble-content a:hover {
      opacity: 0.8;
    }
    .bubble-content code {
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: 6px;
      padding: 1px 6px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
    }
    .bubble-content pre {
      margin: 8px 0 10px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--code-border);
      background: var(--pre-bg);
      overflow-x: auto;
    }
    .bubble-content pre code {
      border: none;
      background: transparent;
      padding: 0;
      font-size: 12px;
    }
    .bubble img {
      max-width: min(100%, 560px);
      border-radius: 10px;
      margin-top: 8px;
      border: 1px solid var(--line);
      display: block;
    }
    @keyframes pop {
      from { transform: translateY(6px); opacity: 0.25; }
      to { transform: translateY(0); opacity: 1; }
    }
    .user { align-self: flex-end; background: var(--user); border-color: #bfd9fb; }
    .bot { align-self: flex-start; background: var(--bot); }
    .thinking {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .thinking-dots {
      display: inline-flex;
      gap: 5px;
      align-items: center;
    }
    .thinking-dots span {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #7eb7ff;
      opacity: 0.3;
      animation: thinkingPulse 1s infinite ease-in-out;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.14s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.28s; }
    @keyframes thinkingPulse {
      0%, 100% { opacity: 0.25; transform: translateY(0); }
      40% { opacity: 0.95; transform: translateY(-2px); }
    }
    .meta {
      align-self: center;
      color: var(--muted);
      font-size: 12px;
      padding: 2px 0 4px;
    }
    .error { color: var(--error); }
    form {
      border-top: 1px solid var(--line);
      padding: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto auto;
      gap: 10px;
      background: var(--form-bg);
    }
    #prompt {
      grid-column: 2;
      grid-row: 1;
    }
    #attachBtn {
      grid-column: 1;
      grid-row: 1;
    }
    #send {
      grid-column: 3;
      grid-row: 1;
    }
    .attachment-tray {
      grid-column: 1 / -1;
      grid-row: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 0;
    }
    .starter-prompts {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding-top: 2px;
    }
    .starter-chip {
      border: 1px solid #b8d7ff;
      background: #eef6ff;
      color: #234f7b;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: "Space Grotesk", sans-serif;
    }
    .attachment-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #bfd9fb;
      background: #eef6ff;
      color: #23476d;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      max-width: 100%;
    }
    .attachment-name {
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }
    .attachment-state {
      color: #416993;
      font-size: 11px;
    }
    .attachment-remove {
      border: none;
      background: transparent;
      color: #2d5b8a;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0;
    }
    .attachment-chip.uploaded {
      background: #e8fff3;
      border-color: #b8eccf;
      color: #1f5c3f;
    }
    input, button {
      font: inherit;
      border-radius: 12px;
      padding: 11px 12px;
    }
    input, select {
      border: 1px solid var(--line);
      background: var(--input-bg);
      color: var(--ink);
      outline: none;
    }
    select { cursor: pointer; }
    input:focus, select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--input-focus-shadow); }
    button.send {
      border: none;
      background: var(--brand);
      color: white;
      font-weight: 700;
      cursor: pointer;
      min-width: 90px;
      font-family: "Space Grotesk", sans-serif;
    }
    .attach-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      min-width: 80px;
      cursor: pointer;
      font-family: "Space Grotesk", sans-serif;
    }
    button:disabled { opacity: 0.7; cursor: default; }
    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10, 20, 40, 0.45);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      display: none;
    }
    .sidebar-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }
    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr !important;
        height: 100vh;
        width: 100vw;
        transition: none;
      }
      .app.sidebar-hidden aside {
        width: 280px;
        min-width: unset;
        padding: 22px 18px;
        opacity: 1;
        pointer-events: auto;
        border-right: 1px solid var(--line);
      }
      aside {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        width: 280px;
        max-width: 85vw;
        z-index: 200;
        border-right: 1px solid var(--line);
        border-bottom: none;
        padding: 22px 18px;
        gap: 16px;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        overflow-y: auto;
        overflow-x: hidden;
      }
      aside.mobile-open {
        transform: translateX(0);
        box-shadow: 4px 0 24px rgba(10, 20, 40, 0.18);
      }
      .sidebar-backdrop { display: block; }
      .logo { font-size: 22px; }
      .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      #chat { padding-bottom: 18px; }
    }
    .history-wrap {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      margin-top: 4px;
    }
    .legal-links {
      margin-top: auto;
      display: flex;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
      padding-top: 8px;
    }
    .legal-links a {
      color: #2e6fb0;
      text-decoration: none;
      font-weight: 700;
    }
    .legal-links a:hover { text-decoration: underline; }
    .history-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .history-list {
      list-style: none;
      margin: 0;
      padding: 0;
      overflow-y: auto;
      display: grid;
      gap: 6px;
      max-height: 320px;
    }
    .history-item {
      display: flex;
      align-items: stretch;
      gap: 4px;
    }
    .history-item-btn {
      flex: 1;
      min-width: 0;
      text-align: left;
      border: 1px solid var(--line);
      background: var(--bot);
      color: var(--ink);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.3;
      cursor: pointer;
    }
    .history-item-btn.active {
      border-color: var(--brand);
      background: var(--brand-soft);
    }
    .history-del-btn {
      border: 1px solid var(--line);
      background: var(--bot);
      color: var(--muted);
      border-radius: 8px;
      padding: 4px 7px;
      font-size: 13px;
      cursor: pointer;
      flex-shrink: 0;
      align-self: center;
      line-height: 1;
    }
    .history-del-btn:hover { background: var(--error); color: #fff; border-color: var(--error); }
    .history-preview {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
    }
    .history-time {
      display: block;
      color: var(--muted);
      margin-top: 3px;
    }
    .bubble-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .knowledge-section { margin-top: 6px; }
    .knowledge-title { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .knowledge-list { list-style: none; margin: 6px 0 0 0; padding: 0; display: grid; gap: 4px; max-height: 140px; overflow-y: auto; }
    .knowledge-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px; background: #fff; }
    .knowledge-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .knowledge-del-btn { border: none; background: transparent; color: var(--muted); cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
    .knowledge-del-btn:hover { color: var(--error); }
    .workspace-section { margin-top: 6px; }
    .workspace-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink); border: 1px solid var(--line); border-radius: 8px; padding: 5px 8px; background: #fff; cursor: pointer; }
    .workspace-item:hover { background: var(--hover); }
    .workspace-item.active { border-color: var(--accent); background: var(--accent-pale, #e8f0fe); font-weight: 700; }
    .workspace-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .workspace-panel { margin-top: 6px; border: 1px solid var(--line); border-radius: 8px; padding: 8px; }
    .workspace-panel-name { font-size: 12px; font-weight: 700; margin-bottom: 6px; color: var(--ink); }
    .workspace-input { font-size: 11px; padding: 4px 6px; border: 1px solid var(--line); border-radius: 6px; background: var(--panel); color: var(--ink); flex: 1; min-width: 0; }
    .workspace-row { display: flex; gap: 4px; margin-top: 4px; }
    .dark-toggle {
      border: 1px solid var(--line);
      background: var(--bot);
      color: var(--ink);
      border-radius: 9px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: "Space Grotesk", sans-serif;
      white-space: nowrap;
    }
    .model-select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .model-select-wrap select {
      font-size: 12px;
      padding: 6px 8px;
      border-radius: 9px;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 600;
      flex: 1;
    }
    .bubble-copy-btn, .bubble-retry-btn {
      border: 1px solid var(--line);
      background: var(--bot);
      color: var(--muted);
      border-radius: 8px;
      padding: 3px 9px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      font-family: "Space Grotesk", sans-serif;
    }
    .bubble-copy-btn:hover, .bubble-retry-btn:hover { background: var(--brand-soft); color: var(--ink); }
    .web-source-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--brand);
      background: var(--brand-soft);
      border: 1px solid #c3deff;
      border-radius: 8px;
      padding: 3px 8px;
      font-family: "Space Grotesk", sans-serif;
      pointer-events: none;
      user-select: none;
    }
    .model-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      background: var(--brand-soft);
      color: var(--brand);
      border-radius: 5px;
      padding: 1px 5px;
      margin-left: 5px;
      font-family: "Space Grotesk", sans-serif;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="app">
    <aside id="sidebar">
      <div class="logo">Cortex Engine</div>
      <div class="tag">Created by Trent DeRosa</div>
      <div class="controls">
        <label class="toggle"><input id="webSearch" type="checkbox" checked> Web search</label>
        <div class="model-select-wrap">
          <label for="modelSelect">Model</label>
          <select id="modelSelect">
            <option value="gpt-4o-mini">Cortex 1 (fast)</option>
            <option value="gpt-4o">Cortex 2 (smart)</option>
            <option value="gpt-4.1-mini">Cortex 3 (advanced)</option>
            <option value="gpt-4.1">Cortex 4 (best)</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;">
          <button id="newChat" class="btn" type="button" style="flex:1;">New Chat</button>
          <button id="darkToggle" class="dark-toggle" type="button" title="Toggle dark mode">🌙</button>
        </div>
      </div>
      <div class="auth-box">
        <input id="authEmail" type="email" placeholder="Email" autocomplete="username">
        <input id="authPassword" type="password" placeholder="Password" autocomplete="current-password">
        <div class="auth-actions">
          <button id="continueAuthBtn" type="button">Login</button>
          <button id="registerAuthBtn" type="button">Register</button>
        </div>
        <input id="resetNewPassword" type="password" placeholder="New password (8+ chars)" autocomplete="new-password">
        <div class="auth-actions">
          <button id="resetPasswordBtn" type="button">Reset Password</button>
        </div>
        <div class="plan-actions" id="planActions" style="display:none;">
          <button id="upgradePro5Btn" type="button">Upgrade $5</button>
          <button id="upgradePro10Btn" type="button">Upgrade $10</button>
          <button id="manageBillingBtn" type="button">Manage Billing</button>
        </div>
        <button id="logoutBtn" type="button" class="btn" style="display:none;padding:8px 10px;">Logout</button>
        <div id="authStatus" class="auth-user">Not logged in. Free mode may be limited.</div>
      </div>
      <div class="history-wrap">
        <div class="history-title">Past Conversations</div>
        <ul id="historyList" class="history-list"></ul>
      </div>

  <script>
    const chatEl = document.getElementById("chat");
    const formEl = document.getElementById("form");
    const promptEl = document.getElementById("prompt");
    const sendEl = document.getElementById("send");
    const attachBtnEl = document.getElementById("attachBtn");
    const fileInputEl = document.getElementById("fileInput");
    const attachmentTrayEl = document.getElementById("attachmentTray");
    const newChatEl = document.getElementById("newChat");
    const webSearchEl = document.getElementById("webSearch");
    const modelSelectEl = document.getElementById("modelSelect");
    const MODEL_DISPLAY = {
      "gpt-4o-mini": "Cortex 1 (fast)",
      "gpt-4o": "Cortex 2 (smart)",
      "gpt-4.1-mini": "Cortex 3 (advanced)",
      "gpt-4.1": "Cortex 4 (best)",
    };
    const darkToggleEl = document.getElementById("darkToggle");
    const historyListEl = document.getElementById("historyList");
    const authEmailEl = document.getElementById("authEmail");
    const authPasswordEl = document.getElementById("authPassword");
    const continueAuthBtnEl = document.getElementById("continueAuthBtn");
    const registerAuthBtnEl = document.getElementById("registerAuthBtn");
    const resetNewPasswordEl = document.getElementById("resetNewPassword");
    const resetPasswordBtnEl = document.getElementById("resetPasswordBtn");
    const logoutBtnEl = document.getElementById("logoutBtn");
    const planActionsEl = document.getElementById("planActions");
    const upgradePro5BtnEl = document.getElementById("upgradePro5Btn");
    const upgradePro10BtnEl = document.getElementById("upgradePro10Btn");
    const manageBillingBtnEl = document.getElementById("manageBillingBtn");
    const authStatusEl = document.getElementById("authStatus");
    const appEl = document.querySelector(".app");
    const asideEl = document.getElementById("sidebar");
    const backdropEl = document.getElementById("sidebarBackdrop");
    const toggleSidebarBtnEl = document.getElementById("toggleSidebarBtn");
    function isMobile() { return window.innerWidth <= 920; }

    const DARK_KEY = "cortex_dark_mode";
    const MODEL_KEY = "cortex_model";
    const WORKSPACE_KEY = "cortex_active_workspace_id";

    let conversationId = localStorage.getItem(KEY) || null;
    let currentUser = null;
    const MAX_RENDERED_ITEMS = 220;

    const browserUtcOffsetMinutes = new Date().getTimezoneOffset();
    let userLocationLabel = null;
    let pendingFiles = [];
    let uploadedFileNames = [];
    let sidebarHidden = localStorage.getItem(SIDEBAR_KEY) === "true";
    let darkMode = localStorage.getItem(DARK_KEY) === "true";
    const knowledgeSectionEl = document.getElementById("knowledgeSection");
    const uploadNoteBtnEl = document.getElementById("uploadNoteBtn");
    const noteFileInputEl = document.getElementById("noteFileInput");
    const notesListEl = document.getElementById("notesList");
    const workspaceSectionEl = document.getElementById("workspaceSection");
    const workspaceListEl = document.getElementById("workspaceList");
    const newWorkspaceNameEl = document.getElementById("newWorkspaceName");
    const createWorkspaceBtnEl = document.getElementById("createWorkspaceBtn");
    const activeWorkspacePanelEl = document.getElementById("activeWorkspacePanel");
    const activeWorkspaceNameEl = document.getElementById("activeWorkspaceName");
    const activeWorkspaceSummaryEl = document.getElementById("activeWorkspaceSummary");
    const inviteEmailEl = document.getElementById("inviteEmail");
    const inviteBtnEl = document.getElementById("inviteBtn");
    const workspaceFilesListEl = document.getElementById("workspaceFilesList");
    const uploadWorkspaceNoteBtnEl = document.getElementById("uploadWorkspaceNoteBtn");
    const workspaceNoteFileInputEl = document.getElementById("workspaceNoteFileInput");
    let activeWorkspace = null;

    function applyDarkMode() {
      document.documentElement.classList.toggle("dark", darkMode);
      darkToggleEl.textContent = darkMode ? "☀️" : "🌙";
      darkToggleEl.title = darkMode ? "Switch to light mode" : "Switch to dark mode";
    }
    darkToggleEl.addEventListener("click", () => {
      darkMode = !darkMode;
      localStorage.setItem(DARK_KEY, String(darkMode));
      applyDarkMode();
    });

    // Restore saved model selection.
    const savedModel = localStorage.getItem(MODEL_KEY);
    if (savedModel && modelSelectEl) {
      for (const opt of modelSelectEl.options) {
        if (opt.value === savedModel) { opt.selected = true; break; }
      }
    }
    modelSelectEl?.addEventListener("change", () => {
      localStorage.setItem(MODEL_KEY, modelSelectEl.value);
    });

    function applySidebarState() {
      if (isMobile()) {
        const open = asideEl.classList.contains("mobile-open");
        backdropEl.classList.toggle("visible", open);
        toggleSidebarBtnEl.textContent = "☰";
        appEl.classList.remove("sidebar-hidden");
      } else {
        appEl.classList.toggle("sidebar-hidden", sidebarHidden);
        asideEl.classList.remove("mobile-open");
        backdropEl.classList.remove("visible");
        toggleSidebarBtnEl.textContent = sidebarHidden ? "Show Sidebar" : "Hide Sidebar";
      }
    }
    let thinkingEl = null;

    function fileSizeLabel(bytes) {
      const size = Number(bytes || 0);
      if (size < 1024) return `${size} B`;
      if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
      return `${(size / (1024 * 1024)).toFixed(1)} MB`;
    }

    function renderAttachmentTray() {
      attachmentTrayEl.innerHTML = "";
      for (let i = 0; i < pendingFiles.length; i++) {
        const file = pendingFiles[i];
        const chip = document.createElement("div");
        chip.className = "attachment-chip";
        chip.innerHTML = `<span class="attachment-name">${escapeHtml(file.name)}</span><span class="attachment-state">ready • ${fileSizeLabel(file.size)}</span>`;
        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "attachment-remove";
        removeBtn.title = "Remove attachment";
        removeBtn.textContent = "×";
        removeBtn.addEventListener("click", () => {
          pendingFiles.splice(i, 1);
          const dt = new DataTransfer();
          for (const f of pendingFiles) dt.items.add(f);
          fileInputEl.files = dt.files;
          renderAttachmentTray();
        });
        chip.appendChild(removeBtn);
        attachmentTrayEl.appendChild(chip);
      }

      for (const name of uploadedFileNames.slice(-3)) {
        const chip = document.createElement("div");
        chip.className = "attachment-chip uploaded";
        chip.innerHTML = `<span class="attachment-name">${escapeHtml(name)}</span><span class="attachment-state">uploaded</span>`;
        attachmentTrayEl.appendChild(chip);
      }
    }

    function pruneChatIfNeeded() {
      while (chatEl.children.length > MAX_RENDERED_ITEMS) {
        chatEl.removeChild(chatEl.firstChild);
      }
    }

    async function apiFetch(url, options = {}) {
      const opts = { ...options };
      opts.headers = { ...(opts.headers || {}) };
      return fetch(url, opts);
    }

    function isConversationAccessError(status, detail) {
      const normalized = String(detail || "").toLowerCase();
      if (status === 404 && normalized.includes("conversation not found")) return true;
      if (status === 403 && normalized.includes("forbidden for this conversation")) return true;
      return false;
    }

    function resetConversationState() {
      conversationId = null;
      localStorage.removeItem(KEY);
    }

    function setAuthState(user) {
      currentUser = user || null;
      const loggedIn = !!currentUser;
      const isCreator = !!currentUser?.is_creator;
      authEmailEl.style.display = loggedIn ? "none" : "";
      authPasswordEl.style.display = loggedIn ? "none" : "";
      continueAuthBtnEl.style.display = loggedIn ? "none" : "";
      registerAuthBtnEl.style.display = loggedIn ? "none" : "";
      const directResetEnabled = !!authRuntime?.password_reset_dev_mode;
      resetNewPasswordEl.style.display = !loggedIn && directResetEnabled ? "" : "none";
      resetPasswordBtnEl.style.display = !loggedIn && directResetEnabled ? "" : "none";
      logoutBtnEl.style.display = loggedIn ? "" : "none";
      planActionsEl.style.display = loggedIn && !isCreator ? "" : "none";
      knowledgeSectionEl.style.display = loggedIn ? "" : "none";
      workspaceSectionEl.style.display = loggedIn ? "" : "none";
      if (!loggedIn) {
        authStatusEl.textContent = "Not logged in. Free mode may be limited.";
        if (notesListEl) notesListEl.innerHTML = "";
        activeWorkspace = null;
        activeWorkspacePanelEl.style.display = "none";
        activeWorkspaceSummaryEl.textContent = "";
      }
    }

    async function refreshMe() {
      try {
        const res = await apiFetch("/auth/me");
        if (!res.ok) throw new Error("auth");
        const data = await res.json();
        setAuthState(data.user);
        const limits = data.limits || {};
        const inputCap = limits.inputs_per_hour == null ? "unlimited" : `${limits.inputs_per_hour}/hour`;
        const imageCap = limits.images_per_hour == null ? "unlimited" : `${limits.images_per_hour}/hour`;
        const privilegeLabel = data.user.is_creator ? "creator admin" : data.user.plan;
        authStatusEl.textContent = `${data.user.email} | ${privilegeLabel} | prompts: ${inputCap} | images: ${imageCap} | used: ${data.usage_last_hour}`;
      } catch (_) {
        setAuthState(null);
      }
    }

    async function refreshAuthRuntime() {
      try {
        const res = await apiFetch("/health");
        if (!res.ok) return;
        authRuntime = await res.json();
        const directResetEnabled = !!authRuntime.password_reset_dev_mode;
        resetNewPasswordEl.style.display = directResetEnabled && !currentUser ? "" : "none";
        resetPasswordBtnEl.style.display = directResetEnabled && !currentUser ? "" : "none";
      } catch (_) {
        authRuntime = null;
      }
    }

    function addBubble(text, role = "bot", extraClass = "") {
      const div = document.createElement("div");
      div.className = `bubble ${role} ${extraClass}`.trim();
      const content = document.createElement("div");
      content.className = "bubble-content";
      content.innerHTML = formatMessageText(text);
      div.appendChild(content);
      if (role === "bot" && !extraClass.includes("error")) {
        const actions = document.createElement("div");
        actions.className = "bubble-actions";
        const copyBtn = document.createElement("button");
        copyBtn.type = "button"; copyBtn.className = "bubble-copy-btn"; copyBtn.textContent = "Copy";
        copyBtn.addEventListener("click", () => {
          navigator.clipboard.writeText(content.innerText || "").catch(() => {});
          copyBtn.textContent = "Copied!"; setTimeout(() => { copyBtn.textContent = "Copy"; }, 1500);
        });
        actions.appendChild(copyBtn);
        div.appendChild(actions);
      }
      chatEl.appendChild(div);
      pruneChatIfNeeded();
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    async function typeBubble(text, role = "bot", extraClass = "") {
      const div = document.createElement("div");
      div.className = `bubble ${role} ${extraClass}`.trim();
      const content = document.createElement("div");
      content.className = "bubble-content";
      div.appendChild(content);
      chatEl.appendChild(div);
      pruneChatIfNeeded();
      chatEl.scrollTop = chatEl.scrollHeight;

      const tokens = String(text || "").match(/\S+\s*/g) || [];
      let rendered = "";
      const perTokenDelayMs = role === "bot" ? 22 : 0;
      for (const token of tokens) {
        rendered += token;
        content.innerHTML = formatMessageText(rendered);
        chatEl.scrollTop = chatEl.scrollHeight;
        if (perTokenDelayMs > 0) {
          await new Promise((resolve) => setTimeout(resolve, perTokenDelayMs));
        }
      }
      if (!tokens.length) {
        content.innerHTML = formatMessageText(text);
      }
    }

    function escapeHtml(input) {
      return String(input)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatInline(text) {
      // Split on markdown links [label](url) and bare URLs so we can process
      // each piece without double-escaping URLs.
      const urlPattern = /(\[([^\]]+)\]\((https?:\/\/[^\s)]+)\))|(https?:\/\/[^\s<>"]+)/g;
      let out = "";
      let last = 0;
      let m;
      while ((m = urlPattern.exec(text)) !== null) {
        // escape and format the plain text before this match
        const plain = text.slice(last, m.index);
        let esc = escapeHtml(plain);
        esc = esc.replace(/`([^`]+)`/g, "<code>$1</code>");
        esc = esc.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        out += esc;
        if (m[1]) {
          // markdown link: [label](url)
          out += `<a href="${escapeHtml(m[3])}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(m[3])}">${escapeHtml(m[2])}</a>`;
        } else {
          // bare URL — show hostname as the label, full URL on hover
          const url = m[0];
          let label = url;
          try { label = new URL(url).hostname.replace(/^www\./, ""); } catch (_) {}
          out += `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(url)}">${escapeHtml(label)}</a>`;
        }
        last = m.index + m[0].length;
      }
      // remaining plain text
      let tail = escapeHtml(text.slice(last));
      tail = tail.replace(/`([^`]+)`/g, "<code>$1</code>");
      tail = tail.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      out += tail;
      return out;
    }

    function formatMessageText(text) {
      const raw = String(text || "");
      const withCodeBlocks = raw.replace(/```([\s\S]*?)```/g, (m, code) => {
        return `\n<pre><code>${escapeHtml(code.trim())}</code></pre>\n`;
      });
      const lines = withCodeBlocks.split("\n");
      const chunks = [];
      let listBuffer = [];
      let orderedListBuffer = [];

      const flushList = () => {
        if (!listBuffer.length) return;
        const items = listBuffer.map(item => `<li>${formatInline(item)}</li>`).join("");
        chunks.push(`<ul>${items}</ul>`);
        listBuffer = [];
      };
      const flushOrderedList = () => {
        if (!orderedListBuffer.length) return;
        const items = orderedListBuffer.map(item => `<li>${formatInline(item)}</li>`).join("");
        chunks.push(`<ol>${items}</ol>`);
        orderedListBuffer = [];
      };

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) {
          flushList();
          flushOrderedList();
          continue;
        }
        if (trimmed.startsWith("<pre><code>") && trimmed.endsWith("</code></pre>")) {
          flushList();
          flushOrderedList();
          chunks.push(trimmed);
          continue;
        }
        if (/^#{1,3}\s+/.test(trimmed)) {
          flushList();
          flushOrderedList();
          const level = Math.min((trimmed.match(/^#+/) || ["#"])[0].length, 3);
          const title = trimmed.replace(/^#{1,3}\s+/, "");
          chunks.push(`<h${level}>${formatInline(title)}</h${level}>`);
          continue;
        }
        if (trimmed.startsWith("- ")) {
          flushOrderedList();
          listBuffer.push(trimmed.slice(2));
          continue;
        }
        const numbered = trimmed.match(/^\d+\.\s+(.*)$/);
        if (numbered) {
          flushList();
          orderedListBuffer.push(numbered[1]);
          continue;
        }
        flushList();
        flushOrderedList();
        chunks.push(`<p>${formatInline(trimmed)}</p>`);
      }
      flushList();
      flushOrderedList();
      return chunks.join("");
    }

    function addImage(src, alt = "Generated image") {
      const div = document.createElement("div");
      div.className = "bubble bot";
      const label = document.createElement("div");
      label.textContent = "Generated image";
      const img = document.createElement("img");
      img.src = src;
      img.alt = alt;
      img.loading = "lazy";
      div.appendChild(label);
      div.appendChild(img);
      chatEl.appendChild(div);
      pruneChatIfNeeded();
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function addMeta(text) {
      const div = document.createElement("div");
      div.className = "meta";
      div.textContent = text;
      chatEl.appendChild(div);
      pruneChatIfNeeded();
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function createBotBubble(initialText = "") {
      const model = modelSelectEl?.value || "gpt-4o-mini";
      const div = document.createElement("div");
      div.className = "bubble bot";
      // Thinking indicator — visible until real content arrives
      const thinkDiv = document.createElement("div");
      thinkDiv.className = "thinking";
      thinkDiv.innerHTML = `<span>Cortex Engine is thinking</span><span class="model-badge">${escapeHtml(MODEL_DISPLAY[model] || model)}</span><span class="thinking-dots"><span></span><span></span><span></span></span>`;
      div.appendChild(thinkDiv);
      const content = document.createElement("div");
      content.className = "bubble-content";
      content.style.display = "none";
      div.appendChild(content);
      const actions = document.createElement("div");
      actions.className = "bubble-actions";
      actions.style.display = "none";
      const copyBtn = document.createElement("button");
      copyBtn.type = "button"; copyBtn.className = "bubble-copy-btn"; copyBtn.textContent = "Copy";
      copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(content.innerText || "").catch(() => {});
        copyBtn.textContent = "Copied!"; setTimeout(() => { copyBtn.textContent = "Copy"; }, 1500);
      });
      actions.appendChild(copyBtn);
      div.appendChild(actions);
      // If created with initial text, skip thinking state immediately
      if (initialText) {
        thinkDiv.style.display = "none";
        content.style.display = "";
        content.innerHTML = formatMessageText(initialText);
        actions.style.display = "";
      }
      chatEl.appendChild(div);
      pruneChatIfNeeded();
      chatEl.scrollTop = chatEl.scrollHeight;
      lastBotBubble = { div, content, actions, thinkDiv };
      return lastBotBubble;
    }

    function revealBubbleContent(bubble, text) {
      bubble.thinkDiv.style.display = "none";
      bubble.content.style.display = "";
      bubble.content.innerHTML = formatMessageText(text);
      bubble.actions.style.display = "";
    }

    function showThinking() {
      hideThinking();
      const model = modelSelectEl?.value || "gpt-4o-mini";
      const div = document.createElement("div");
      div.className = "bubble bot";
      div.setAttribute("data-thinking", "true");
      div.innerHTML = `<div class="thinking"><span>Cortex Engine is thinking</span><span class="model-badge">${escapeHtml(MODEL_DISPLAY[model] || model)}</span><span class="thinking-dots"><span></span><span></span><span></span></span></div>`;
      chatEl.appendChild(div);
      thinkingEl = div;
      pruneChatIfNeeded();
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function hideThinking() {
      if (thinkingEl && thinkingEl.parentNode) {
        thinkingEl.parentNode.removeChild(thinkingEl);
      }
      thinkingEl = null;
    }

    function initLocationHint() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude.toFixed(3);
          const lon = pos.coords.longitude.toFixed(3);
          userLocationLabel = `${lat}, ${lon}`;
        },
        () => {
          userLocationLabel = null;
        },
        { enableHighAccuracy: false, timeout: 6000, maximumAge: 300000 }
      );
    }

    async function resolveUserLocationLabel() {
      if (userLocationLabel) return userLocationLabel;
      if (!navigator.geolocation) return null;
      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const lat = pos.coords.latitude.toFixed(3);
            const lon = pos.coords.longitude.toFixed(3);
            userLocationLabel = `${lat}, ${lon}`;
            resolve(userLocationLabel);
          },
          () => resolve(null),
          { enableHighAccuracy: false, timeout: 6000, maximumAge: 300000 }
        );
      });
    }

    async function sendMessage(message, retryOnConversationError = true) {
      sendEl.disabled = true;
      attachBtnEl.disabled = true;
      const chips = starterPromptsEl?.querySelectorAll(".starter-chip") || [];
      chips.forEach(chip => chip.disabled = true);
      showThinking();
      try {
        // Upload selected files first so they can be used in this turn.
        if (pendingFiles.length) {
          for (const file of pendingFiles) {
            const formData = new FormData();
            formData.append("file", file);
            if (conversationId) formData.append("conversation_id", conversationId);
            if (activeWorkspace?.id) formData.append("workspace_id", activeWorkspace.id);
            const uploadRes = await apiFetch("/upload", { method: "POST", body: formData });
            const uploadData = await uploadRes.json();
            if (!uploadRes.ok) {
              if (retryOnConversationError && conversationId && isConversationAccessError(uploadRes.status, uploadData.detail)) {
                resetConversationState();
                hideThinking();
                return await sendMessage(message, false);
              }
              throw new Error(uploadData.detail || "Upload failed");
            }
            conversationId = uploadData.conversation_id;
            localStorage.setItem(KEY, conversationId);
            uploadedFileNames.push(uploadData.filename || file.name);
            addMeta(`Attached ${uploadData.filename}`);
          }
          pendingFiles = [];
          fileInputEl.value = "";
          renderAttachmentTray();
        }

        const res = await apiFetch("/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            conversation_id: conversationId,
            workspace_id: activeWorkspace?.id || null,
            use_web_search: webSearchEl.checked,
            user_timezone: browserTimeZone,
            user_utc_offset_minutes: browserUtcOffsetMinutes,
            user_location_label: userLocationLabel,
            model: modelSelectEl?.value || null,
          })
        });
        if (!res.ok) {
          const data = await res.json();
          if (retryOnConversationError && conversationId && isConversationAccessError(res.status, data.detail)) {
            resetConversationState();
            hideThinking();
            return await sendMessage(message, false);
          }
          throw new Error(data.detail || "Request failed");
        }

        hideThinking();
        const bubble = createBotBubble(""); // shows thinking dots inside the bubble
        const reader = res.body?.getReader();
        if (!reader) throw new Error("Streaming not supported by browser.");
        const decoder = new TextDecoder("utf-8");
        let buffer = "";
        let builtAnswer = "";
        let finalPayload = null;

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const events = buffer.split("\n\n");
          buffer = events.pop() || "";
          for (const evt of events) {
            const lines = evt.split("\n");
            let eventName = "message";
            let dataStr = "";
            for (const line of lines) {
              if (line.startsWith("event:")) eventName = line.slice(6).trim();
              if (line.startsWith("data:")) dataStr += line.slice(5).trim();
            }
            if (!dataStr) continue;
            let parsed = null;
            try { parsed = JSON.parse(dataStr); } catch (_) { continue; }
            if (eventName === "meta" && parsed?.conversation_id) {
              conversationId = parsed.conversation_id;
              localStorage.setItem(KEY, conversationId);
            } else if (eventName === "token" && parsed?.token) {
              builtAnswer += parsed.token;
              revealBubbleContent(bubble, builtAnswer);
              chatEl.scrollTop = chatEl.scrollHeight;
            } else if (eventName === "replace" && parsed?.answer) {
              builtAnswer = parsed.answer;
              revealBubbleContent(bubble, builtAnswer);
              chatEl.scrollTop = chatEl.scrollHeight;
            } else if (eventName === "error") {
              builtAnswer = parsed?.detail || "An error occurred. Please try again.";
              revealBubbleContent(bubble, builtAnswer);
            } else if (eventName === "done") {
              finalPayload = parsed;
            }
          }
        }

        if (finalPayload?.conversation_id) {
          conversationId = finalPayload.conversation_id;
          localStorage.setItem(KEY, conversationId);
        }
        const finalAnswer = finalPayload?.answer || builtAnswer || "No response generated.";
        revealBubbleContent(bubble, finalAnswer);
        if (finalPayload?.used_web_search) {
          const badge = document.createElement("span");
          badge.className = "web-source-badge";
          badge.textContent = "\u{1F310} Live web";
          bubble.actions.appendChild(badge);
        }
        if (finalPayload?.generated_images?.length) {
          for (const src of finalPayload.generated_images) {
            addImage(src, "AI generated image");
          }
        }
        await refreshConversationList();
      } catch (err) {
        hideThinking();
        addBubble("Error: " + err.message, "bot", "error");
      } finally {
        hideThinking();
        sendEl.disabled = false;
        attachBtnEl.disabled = false;
        chips.forEach(chip => chip.disabled = false);
        promptEl.focus();
      }
    }

    async function loadConversation() {
      if (!conversationId) return;
      try {
        const res = await apiFetch(`/conversations/${conversationId}`);
        if (!res.ok) {
          if (isConversationAccessError(res.status, await res.text())) {
            resetConversationState();
            await refreshConversationList();
          }
          return;
        }
        const data = await res.json();
        chatEl.innerHTML = "";
        for (const msg of data.messages.slice(-60)) {
          addBubble(msg.content, msg.role === "user" ? "user" : "bot");
        }
        addMeta("Conversation restored.");
      } catch (_) {
        // Ignore restore failures and continue with a fresh visible window.
      }
    }

    function fmtDate(value) {
      if (!value) return "";
      const normalized = `${String(value).replace(" ", "T")}Z`;
      const dt = new Date(normalized);
      if (Number.isNaN(dt.getTime())) return "";
      return dt.toLocaleString();
    }

    async function deleteConversation(convId) {
      if (!confirm("Delete this conversation? This cannot be undone.")) return;
      try {
        const res = await apiFetch(`/conversations/${convId}`, { method: "DELETE" });
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          addBubble("Could not delete: " + (d.detail || "Unknown error"), "bot", "error");
          return;
        }
        if (conversationId === convId) {
          conversationId = null;
          localStorage.removeItem(KEY);
          chatEl.innerHTML = "";
          addMeta("Conversation deleted. Start a new one.");
        }
        await refreshConversationList();
      } catch (err) {
        addBubble("Delete error: " + err.message, "bot", "error");
      }
    }

    async function refreshConversationList() {
      try {
        const query = activeWorkspace?.id ? `/conversations?limit=50&workspace_id=${encodeURIComponent(activeWorkspace.id)}` : "/conversations?limit=50";
        const res = await apiFetch(query);
        if (!res.ok) return;
        const data = await res.json();
        historyListEl.innerHTML = "";
        for (const convo of data.conversations || []) {
          const li = document.createElement("li");
          li.className = "history-item";
          const btn = document.createElement("button");
          btn.className = "history-item-btn";
          if (convo.conversation_id === conversationId) btn.classList.add("active");
          const workspaceTag = convo.workspace_id ? " • workspace" : "";
          btn.innerHTML = `<span class="history-preview">${escapeHtml(convo.title || convo.preview || "New conversation")}</span><span class="history-time">${fmtDate(convo.last_message_at || convo.created_at)}${workspaceTag}</span>`;
          btn.addEventListener("click", async () => {
            conversationId = convo.conversation_id;
            localStorage.setItem(KEY, conversationId);
            await loadConversation();
            await refreshConversationList();
            promptEl.focus();
          });
          const delBtn = document.createElement("button");
          delBtn.className = "history-del-btn";
          delBtn.title = "Delete conversation";
          delBtn.textContent = "×";
          delBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            deleteConversation(convo.conversation_id);
          });
          li.appendChild(btn);
          li.appendChild(delBtn);
          historyListEl.appendChild(li);
        }
      } catch (_) {
        // ignore history refresh errors
      }
    }

    formEl.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = promptEl.value.trim();
      if (!message) return;
      lastUserMessage = message;
      promptEl.value = "";
      addBubble(message, "user");
      await sendMessage(message);
      if (lastBotBubble) {
        const retryBtn = document.createElement("button");
        retryBtn.type = "button"; retryBtn.className = "bubble-retry-btn"; retryBtn.textContent = "Retry";
        retryBtn.addEventListener("click", async () => {
          if (!lastUserMessage) return;
          retryBtn.disabled = true;
          lastUserMessage = lastUserMessage;
          addBubble(lastUserMessage, "user");
          await sendMessage(lastUserMessage);
        });
        lastBotBubble.actions.appendChild(retryBtn);
      }
    });

    attachBtnEl.addEventListener("click", () => {
      fileInputEl.click();
    });

    fileInputEl.addEventListener("change", () => {
      pendingFiles = Array.from(fileInputEl.files || []);
      renderAttachmentTray();
    });

    // Drag-and-drop file upload on chat area.
    chatEl.addEventListener("dragover", (e) => { e.preventDefault(); chatEl.style.outline = "2px dashed var(--brand)"; });
    chatEl.addEventListener("dragleave", () => { chatEl.style.outline = ""; });
    chatEl.addEventListener("drop", (e) => {
      e.preventDefault();
      chatEl.style.outline = "";
      const files = Array.from(e.dataTransfer?.files || []);
      if (!files.length) return;
      pendingFiles.push(...files);
      renderAttachmentTray();
    });

    newChatEl.addEventListener("click", () => {
      conversationId = null;
      localStorage.removeItem(KEY);
      chatEl.innerHTML = "";
      pendingFiles = [];
      uploadedFileNames = [];
      fileInputEl.value = "";
      renderAttachmentTray();
      addMeta("New conversation started.");
      refreshConversationList();
      promptEl.focus();
    });

    starterPromptsEl?.addEventListener("click", async (e) => {
      const btn = e.target.closest(".starter-chip");
      if (!btn) return;
      const action = btn.getAttribute("data-action") || "";
      let message = "";
      if (action === "weather") {
        const label = await resolveUserLocationLabel();
        if (label) {
          message = `What is the weather right now at ${label}? Include temperature, feels-like, and wind speed.`;
        } else {
          message = "What is the weather at my current location right now? If location is unavailable, ask me for my city.";
        }
      } else if (action === "markets") {
        message = "What are SPY, QQQ, and DIA doing right now? Give prices and percent changes.";
      } else if (action === "ai_news") {
        message = "What are the latest AI headlines right now? Give a concise summary.";
      } else if (action === "resume") {
        message = "help me with my resume";
      } else {
        message = btn.getAttribute("data-prompt") || "";
      }
      if (!message) return;
      promptEl.value = "";
      addBubble(message, "user");
      await sendMessage(message);
    });

    toggleSidebarBtnEl.addEventListener("click", () => {
      if (isMobile()) {
        asideEl.classList.toggle("mobile-open");
      } else {
        sidebarHidden = !sidebarHidden;
        localStorage.setItem(SIDEBAR_KEY, String(sidebarHidden));
      }
      applySidebarState();
    });

    backdropEl.addEventListener("click", () => {
      asideEl.classList.remove("mobile-open");
      applySidebarState();
    });

    window.addEventListener("resize", applySidebarState);

    async function loginOnly() {
      const email = authEmailEl.value.trim();
      const password = authPasswordEl.value;
      if (!email || !password) return;
      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Authentication failed");
        setAuthState(data.user);
        authPasswordEl.value = "";
        chatEl.innerHTML = "";
        addMeta("Signed in.");
        await refreshMe();
        const _lr = await apiFetch("/conversations?limit=1");
        if (_lr.ok) {
          const _ld = await _lr.json();
          const _lc = _ld.conversations?.[0];
          if (_lc) { conversationId = _lc.conversation_id; localStorage.setItem(KEY, conversationId); await loadConversation(); }
          else { conversationId = null; localStorage.removeItem(KEY); }
        } else { conversationId = null; localStorage.removeItem(KEY); }
        await refreshNotes();
        await refreshWorkspaces();
        await refreshConversationList();
      } catch (err) {
        addBubble("Error: " + err.message, "bot", "error");
      }
    }

    async function registerOnly() {
      const email = authEmailEl.value.trim();
      const password = authPasswordEl.value;
      if (!email || !password) return;
      try {
        const res = await fetch("/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Registration failed");
        setAuthState(data.user);
        authPasswordEl.value = "";
        conversationId = null;
        localStorage.removeItem(KEY);
        chatEl.innerHTML = "";
        addMeta("Account created and signed in.");
        await refreshMe();
        await refreshConversationList();
      } catch (err) {
        addBubble("Error: " + err.message, "bot", "error");
      }
    }

    async function submitPasswordReset() {
      if (!authRuntime?.password_reset_dev_mode) {
        addBubble("Error: Direct password reset is disabled in this environment. Use the normal login flow.", "bot", "error");
        return;
      }
      const email = authEmailEl.value.trim();
      const newPassword = resetNewPasswordEl.value;
      if (!email || !newPassword) {
        addBubble("Error: Enter email and new password.", "bot", "error");
        return;
      }
      if (newPassword.length < 8) {
        addBubble("Error: New password must be at least 8 characters.", "bot", "error");
        return;
      }
      try {
        const res = await fetch("/auth/reset_password_email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, new_password: newPassword })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Password reset failed");
        authPasswordEl.value = newPassword;
        resetNewPasswordEl.value = "";
        authStatusEl.textContent = data.detail || "Password reset successful. Please log in.";
        addMeta("Password reset successful. Use Continue to log in.");
      } catch (err) {
        addBubble("Error: " + err.message, "bot", "error");
      }
    }

    continueAuthBtnEl.addEventListener("click", loginOnly);
    registerAuthBtnEl.addEventListener("click", registerOnly);
    resetPasswordBtnEl.addEventListener("click", submitPasswordReset);
    authPasswordEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        loginOnly();
      }
    });
    resetNewPasswordEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        submitPasswordReset();
      }
    });

    // Ctrl+K or Cmd+K focuses the prompt input from anywhere.
    document.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "k") {
        e.preventDefault();
        promptEl.focus();
      }
    });

    logoutBtnEl.addEventListener("click", async () => {
      try {
        await apiFetch("/auth/logout", { method: "POST" });
      } catch (_) {}
      setAuthState(null);
      conversationId = null;
      localStorage.removeItem(KEY);
      chatEl.innerHTML = "";
      addMeta("Logged out.");
      refreshConversationList();
    });

    async function startCheckout(plan) {
      if (!currentUser) {
        addBubble("Error: Please log in first.", "bot", "error");
        return;
      }
      try {
        const res = await apiFetch("/billing/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ plan })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Could not start checkout");
        if (!data.checkout_url) throw new Error("No checkout URL returned");
        window.location.href = data.checkout_url;
      } catch (err) {
        addBubble("Error: " + err.message, "bot", "error");
      }
    }

    upgradePro5BtnEl.addEventListener("click", () => startCheckout("pro5"));
    upgradePro10BtnEl.addEventListener("click", () => startCheckout("pro10"));

    manageBillingBtnEl.addEventListener("click", async () => {
      if (!currentUser) {
        addBubble("Error: Please log in first.", "bot", "error");
        return;
      }
      try {
        const res = await apiFetch("/billing/portal", { method: "POST" });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Could not open billing portal");
        if (!data.portal_url) throw new Error("No billing portal URL returned");
        window.location.href = data.portal_url;
      } catch (err) {
        addBubble("Error: " + err.message, "bot", "error");
      }
    });

    async function refreshNotes() {
      if (!currentUser || !notesListEl) return;
      try {
        const res = await apiFetch("/knowledge");
        if (!res.ok) return;
        const data = await res.json();
        notesListEl.innerHTML = "";
        for (const f of data.files || []) {
          const li = document.createElement("li");
          li.className = "knowledge-item";
          li.innerHTML = `<span class="knowledge-item-name" title="${f.filename}">${f.filename}</span>`;
          const delBtn = document.createElement("button");
          delBtn.type = "button"; delBtn.className = "knowledge-del-btn"; delBtn.title = "Delete"; delBtn.textContent = "×";
          delBtn.addEventListener("click", async () => {
            await apiFetch("/knowledge/" + f.id, { method: "DELETE" });
            await refreshNotes();
          });
          li.appendChild(delBtn);
          notesListEl.appendChild(li);
        }
      } catch (_) {}
    }

    uploadNoteBtnEl.addEventListener("click", () => noteFileInputEl.click());
    noteFileInputEl.addEventListener("change", async () => {
      const file = noteFileInputEl.files?.[0];
      if (!file) return;
      const fd = new FormData();
      fd.append("file", file);
      try {
        const res = await apiFetch("/knowledge", { method: "POST", body: fd });
        if (!res.ok) { const d = await res.json(); addBubble("Upload failed: " + (d.detail || "Unknown error"), "bot", "error"); return; }
        await refreshNotes();
      } catch (err) { addBubble("Upload error: " + err.message, "bot", "error"); }
      noteFileInputEl.value = "";
    });

    async function refreshWorkspaces() {
      if (!currentUser || !workspaceListEl) return;
      try {
        const res = await apiFetch("/workspaces");
        if (!res.ok) return;
        const data = await res.json();
        const savedWorkspaceId = localStorage.getItem(WORKSPACE_KEY);
        const shouldRestore = !activeWorkspace && savedWorkspaceId;
        workspaceListEl.innerHTML = "";
        for (const ws of data.workspaces || []) {
          const li = document.createElement("li");
          li.className = "workspace-item" + (activeWorkspace && activeWorkspace.id === ws.id ? " active" : "");
          li.innerHTML = `<span class="workspace-item-name" title="${escapeHtml(ws.name)}">${escapeHtml(ws.name)}</span><span style="font-size:10px;color:var(--muted);">${escapeHtml(ws.role)}</span>`;
          li.addEventListener("click", () => {
            if (activeWorkspace && activeWorkspace.id === ws.id) {
              clearActiveWorkspace();
              return;
            }
            setActiveWorkspace(ws);
          });
          workspaceListEl.appendChild(li);
          if (shouldRestore && ws.id === savedWorkspaceId) {
            activeWorkspace = ws;
          }
        }
        if (shouldRestore && activeWorkspace) {
          activeWorkspaceNameEl.textContent = activeWorkspace.name;
          activeWorkspacePanelEl.style.display = "";
          activeWorkspaceSummaryEl.textContent = "Workspace memory is active across chats in this project.";
          refreshWorkspaceFiles();
        }
      } catch (_) {}
    }

    function clearActiveWorkspace() {
      activeWorkspace = null;
      localStorage.removeItem(WORKSPACE_KEY);
      activeWorkspaceNameEl.textContent = "";
      activeWorkspaceSummaryEl.textContent = "";
      activeWorkspacePanelEl.style.display = "none";
      conversationId = null;
      localStorage.removeItem(KEY);
      chatEl.innerHTML = "";
      addMeta("Workspace context cleared. You're back in general chat.");
      refreshWorkspaces();
      refreshConversationList();
    }

    async function setActiveWorkspace(ws) {
      activeWorkspace = ws;
      localStorage.setItem(WORKSPACE_KEY, ws.id);
      activeWorkspaceNameEl.textContent = ws.name;
      activeWorkspacePanelEl.style.display = "";
      activeWorkspaceSummaryEl.textContent = "Workspace memory is active across chats in this project.";
      conversationId = null;
      localStorage.removeItem(KEY);
      chatEl.innerHTML = "";
      addMeta(`Workspace active: ${ws.name}. New chats will reuse this workspace's memory and files.`);
      try {
        const res = await apiFetch("/workspaces/" + ws.id);
        if (res.ok) {
          const data = await res.json();
          const summary = data.summary?.summary_text || "Workspace memory is active across chats in this project.";
          activeWorkspaceSummaryEl.textContent = summary;
        }
      } catch (_) {}
      await refreshWorkspaceFiles();
      await refreshWorkspaces();
      await refreshConversationList();
    }

    async function refreshWorkspaceFiles() {
      if (!activeWorkspace || !workspaceFilesListEl) return;
      try {
        const res = await apiFetch("/workspaces/" + activeWorkspace.id + "/knowledge");
        if (!res.ok) return;
        const data = await res.json();
        workspaceFilesListEl.innerHTML = "";
        const combined = [...(data.files || []), ...(data.uploaded_files || [])];
        if (!combined.length) {
          workspaceFilesListEl.innerHTML = "<li style='font-size:11px;color:var(--muted);padding:4px 0;'>No files yet.</li>";
          return;
        }
        for (const f of combined) {
          const li = document.createElement("li");
          li.className = "knowledge-item";
          li.innerHTML = `<span class="knowledge-item-name" title="${escapeHtml(f.filename)}">${escapeHtml(f.filename)}</span>`;
          workspaceFilesListEl.appendChild(li);
        }
      } catch (_) {}
    }

    createWorkspaceBtnEl.addEventListener("click", async () => {
      const name = (newWorkspaceNameEl.value || "").trim();
      if (!name) return;
      try {
        const res = await apiFetch("/workspaces", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name }) });
        if (!res.ok) { const d = await res.json(); addBubble("Error: " + (d.detail || "Could not create workspace"), "bot", "error"); return; }
        const workspace = await res.json();
        newWorkspaceNameEl.value = "";
        await refreshWorkspaces();
        await setActiveWorkspace(workspace);
      } catch (err) { addBubble("Error: " + err.message, "bot", "error"); }
    });

    inviteBtnEl.addEventListener("click", async () => {
      if (!activeWorkspace) return;
      const email = (inviteEmailEl.value || "").trim();
      if (!email) return;
      try {
        const res = await apiFetch("/workspaces/" + activeWorkspace.id + "/invite", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email }) });
        const d = await res.json();
        if (!res.ok) { addBubble("Invite failed: " + (d.detail || "Unknown error"), "bot", "error"); return; }
        addBubble("Invited " + d.email + " to " + activeWorkspace.name + ".", "bot");
        inviteEmailEl.value = "";
      } catch (err) { addBubble("Error: " + err.message, "bot", "error"); }
    });

    uploadWorkspaceNoteBtnEl.addEventListener("click", () => workspaceNoteFileInputEl.click());
    workspaceNoteFileInputEl.addEventListener("change", async () => {
      const file = workspaceNoteFileInputEl.files?.[0];
      if (!file || !activeWorkspace) return;
      const fd = new FormData();
      fd.append("file", file);
      fd.append("workspace_id", activeWorkspace.id);
      try {
        const res = await apiFetch("/knowledge", { method: "POST", body: fd });
        if (!res.ok) { const d = await res.json(); addBubble("Upload failed: " + (d.detail || "Unknown error"), "bot", "error"); return; }
        await refreshWorkspaceFiles();
      } catch (err) { addBubble("Upload error: " + err.message, "bot", "error"); }
      workspaceNoteFileInputEl.value = "";
    });

    initLocationHint();
    applySidebarState();
    applyDarkMode();
    Promise.all([refreshAuthRuntime(), refreshMe(), loadConversation(), refreshConversationList(), refreshNotes(), refreshWorkspaces()]).finally(() => {
      renderAttachmentTray();
      if (!chatEl.children.length) {
        addMeta("Cortex Engine by Trent DeRosa — ask anything, attach files, or pick a starter prompt below.");
      }
    });
  </script>
</body>
